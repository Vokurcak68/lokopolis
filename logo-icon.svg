<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Circle background -->
  <circle cx="40" cy="40" r="38" fill="#1a1e2e" stroke="#f0a030" stroke-width="2"/>
  
  <!-- Stylized L+P monogram with rail -->
  <text x="14" y="56" font-family="'Segoe UI',system-ui,sans-serif" font-size="42" font-weight="800" fill="#ffffff">L</text>
  <text x="38" y="56" font-family="'Segoe UI',system-ui,sans-serif" font-size="42" font-weight="800" fill="#f0a030">P</text>
  
  <!-- Rail line at bottom -->
  <line x1="12" y1="64" x2="68" y2="64" stroke="#f0a030" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rail ties -->
  <line x1="20" y1="61" x2="20" y2="67" stroke="#f0a030" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="32" y1="61" x2="32" y2="67" stroke="#f0a030" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="44" y1="61" x2="44" y2="67" stroke="#f0a030" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="56" y1="61" x2="56" y2="67" stroke="#f0a030" stroke-width="1.5" stroke-opacity="0.5"/>
</svg>
